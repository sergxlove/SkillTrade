<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SkillTrade - Обучение</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/Styles/LessonsPage.css"/>
</head>
<body>
    <div class="learning-container">
        <div class="sidebar-lessons" id="sidebarLessons">
            <div class="course-header-sidebar">
                <div class="course-title-sidebar" id="courseTitleSidebar">Fullstack JavaScript</div>
                <div class="progress-info">
                    <span>Прогресс курса</span>
                    <span id="courseProgressPercent">0%</span>
                </div>
                <div class="progress-bar-sidebar">
                    <div class="progress-fill-sidebar" id="courseProgressFill" style="width: 0%;"></div>
                </div>
            </div>
            <div class="lessons-list" id="lessonsListSidebar"></div>
        </div>

        <div class="main-content">
            <div class="top-bar">
                <div style="display: flex; align-items: center; gap: 16px;">
                    <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">
                        <i class="fas fa-bars"></i>
                    </button>
                    <a href="index.html" class="back-link">
                        <i class="fas fa-arrow-left"></i> На главную
                    </a>
                </div>
                <div class="lesson-navigation">
                    <button class="nav-btn" id="prevLessonBtn" onclick="prevLesson()">
                        <i class="fas fa-chevron-left"></i> Предыдущий
                    </button>
                    <button class="complete-btn" id="completeLessonBtn" onclick="markCurrentLessonComplete()">
                        <i class="fas fa-check"></i> Завершить урок
                    </button>
                    <button class="nav-btn" id="nextLessonBtn" onclick="nextLesson()">
                        Следующий <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </div>

            <div class="lesson-content-wrapper" id="lessonContentWrapper"></div>
            <footer>
                <p>© 2025 SkillTrade — Образовательная платформа</p>
            </footer>
        </div>
    </div>

    <script>
    const courseData = {
        id: 1,
        title: "Fullstack JavaScript: от новичка до PRO",
        lessons: [
            {
                id: 1,
                title: "Введение в JavaScript",
                duration: "15 мин",
                content: `
                    <h1>📖 Введение в JavaScript</h1>
                    <p>JavaScript — это язык программирования, который оживляет веб-страницы. Он позволяет создавать интерактивные элементы, анимации, обрабатывать действия пользователя и многое другое.</p>

                    <blockquote>
                        "JavaScript — это язык, который работает везде: в браузере, на сервере, в мобильных приложениях и даже в роботах!"
                    </blockquote>

                    <h2>🎯 Краткая история</h2>
                    <p>JavaScript был создан в 1995 году Бренданом Эйхом за 10 дней. Изначально он назывался Mocha, затем LiveScript, и только потом стал JavaScript. Сегодня это один из самых популярных языков программирования в мире.</p>

                    <h2>🌍 Где используется JavaScript?</h2>
                    <ul>
                        <li><strong>Frontend-разработка</strong> — создание интерактивных веб-интерфейсов (React, Vue, Angular)</li>
                        <li><strong>Backend-разработка</strong> — серверная логика (Node.js, Express)</li>
                        <li><strong>Мобильные приложения</strong> — React Native, Ionic</li>
                        <li><strong>Десктопные приложения</strong> — Electron (VS Code, Discord, Slack)</li>
                        <li><strong>Игровая разработка</strong> — Phaser, Babylon.js</li>
                        <li><strong>Искусственный интеллект</strong> — TensorFlow.js</li>
                    </ul>

                    <h2>💻 Ваш первый код на JavaScript</h2>
                    <pre><code>// Однострочный комментарий
console.log("Привет, SkillTrade!");

// Объявление переменной
let message = "Я изучаю JavaScript";
console.log(message);

// Функция для приветствия
function greet(name) {
    return "Привет, " + name + "!";
}

alert(greet("Студент"));</code></pre>

                    <p>Попробуйте открыть консоль браузера (F12 → Console) и ввести этот код. Вы увидите, как JavaScript оживает!</p>

                    <hr>

                    <h2>📊 Ключевые особенности JavaScript</h2>
                    <table>
                        <tr><th>Особенность</th><th>Описание</th></tr>
                        <tr><td>Динамическая типизация</td><td>Тип переменной определяется автоматически</td></tr>
                        <tr><td>Объектно-ориентированный</td><td>Поддерживает классы и объекты</td></tr>
                        <tr><td>Асинхронность</td><td>Promise, async/await для неблокирующего кода</td></tr>
                        <tr><td>Кросс-платформенность</td><td>Работает на всех ОС и устройствах</td></tr>
                    </table>

                    <div class="quiz-block">
                        <div class="quiz-question">📝 Вопрос: В каком году был создан JavaScript?</div>
                        <div class="quiz-option"><input type="radio" name="quiz1" value="1995" id="q1_1"><label for="q1_1">1995 год</label></div>
                        <div class="quiz-option"><input type="radio" name="quiz1" value="2000" id="q1_2"><label for="q1_2">2000 год</label></div>
                        <div class="quiz-option"><input type="radio" name="quiz1" value="1985" id="q1_3"><label for="q1_3">1985 год</label></div>
                        <button class="quiz-submit" onclick="checkQuiz(1, '1995')">Проверить</button>
                        <div class="quiz-result" id="quizResult1"></div>
                    </div>
                `
            },
            {
                id: 2,
                title: "Переменные и типы данных",
                duration: "20 мин",
                content: `
                    <h1>📦 Переменные и типы данных</h1>
                    <p>Переменные — это "контейнеры" для хранения данных. Представьте их как коробки с наклейками, в которые вы можете положить разные вещи.</p>

                    <h2>🏷️ Объявление переменных</h2>
                    <p>В JavaScript есть три способа объявления переменных:</p>
                    <pre><code>// let — для изменяемых переменных (рекомендуется)
let name = "Алексей";
name = "Иван"; // ✅ можно изменить

// const — для неизменяемых констант
const PI = 3.14159;
// PI = 3.14; // ❌ Ошибка! Нельзя изменить

// var — устаревший способ (избегайте)
var oldWay = "не рекомендуется";</code></pre>

                    <h2>🔢 Типы данных</h2>
                    <p>В JavaScript есть 8 основных типов данных:</p>
                    <ul>
                        <li><strong>String (строка)</strong> — текст: <code>"Привет"</code>, <code>'мир'</code>, <code>\`шаблон\`</code></li>
                        <li><strong>Number (число)</strong> — целые и дробные: <code>42</code>, <code>3.14</code>, <code>-10</code></li>
                        <li><strong>Boolean (логический)</strong> — истина или ложь: <code>true</code>, <code>false</code></li>
                        <li><strong>Undefined</strong> — значение не определено: <code>undefined</code></li>
                        <li><strong>Null</strong> — пустое значение: <code>null</code></li>
                        <li><strong>Object (объект)</strong> — коллекция свойств: <code>{name: "Alex", age: 25}</code></li>
                        <li><strong>Array (массив)</strong> — упорядоченный список: <code>[1, 2, 3]</code></li>
                        <li><strong>Symbol</strong> — уникальный идентификатор</li>
                    </ul>

                    <h2>💻 Примеры использования</h2>
                    <pre><code>// Строки
let firstName = "Алексей";
let lastName = 'Иванов';
let fullName = \`\${firstName} \${lastName}\`; // Шаблонная строка

// Числа
let age = 25;
let price = 99.99;
let temperature = -5;

// Логические значения
let isStudent = true;
let hasGraduated = false;

// Массивы
let colors = ["красный", "зеленый", "синий"];
console.log(colors[0]); // "красный"

// Объекты
let user = {
    name: "Алексей",
    age: 25,
    isActive: true
};
console.log(user.name); // "Алексей"</code></pre>

                    <h2>🔍 Определение типа переменной</h2>
                    <p>Вы можете узнать тип переменной с помощью оператора <code>typeof</code>:</p>
                    <pre><code>typeof "Привет";     // "string"
typeof 42;           // "number"
typeof true;         // "boolean"
typeof undefined;    // "undefined"
typeof null;         // "object" (историческая особенность)
typeof {};           // "object"
typeof [];           // "object"
typeof function(){}; // "function"</code></pre>

                    <div class="quiz-block">
                        <div class="quiz-question">📝 Вопрос: Какой тип данных используется для хранения истинного или ложного значения?</div>
                        <div class="quiz-option"><input type="radio" name="quiz2" value="string" id="q2_1"><label for="q2_1">String (строка)</label></div>
                        <div class="quiz-option"><input type="radio" name="quiz2" value="boolean" id="q2_2"><label for="q2_2">Boolean (логический)</label></div>
                        <div class="quiz-option"><input type="radio" name="quiz2" value="number" id="q2_3"><label for="q2_3">Number (число)</label></div>
                        <button class="quiz-submit" onclick="checkQuiz(2, 'boolean')">Проверить</button>
                        <div class="quiz-result" id="quizResult2"></div>
                    </div>
                `
            },
            {
                id: 3,
                title: "Функции и область видимости",
                duration: "25 мин",
                content: `
                    <h1>⚙️ Функции в JavaScript</h1>
                    <p>Функции — это "кирпичики" вашего кода. Они позволяют группировать инструкции, переиспользовать код и делать программу более организованной.</p>

                    <h2>📝 Способы создания функций</h2>
                    <pre><code>// 1. Function Declaration (объявление функции)
function greet(name) {
    return "Привет, " + name + "!";
}

// 2. Function Expression (функциональное выражение)
const greet2 = function(name) {
    return "Привет, " + name + "!";
};

// 3. Arrow Function (стрелочная функция) — современный способ
const greet3 = (name) => {
    return "Привет, " + name + "!";
};

// 4. Короткая стрелочная функция (если одно выражение)
const greet4 = (name) => "Привет, " + name + "!";

// 5. Стрелочная функция с одним параметром (скобки можно опустить)
const greet5 = name => "Привет, " + name + "!";</code></pre>

                    <h2>🎯 Вызов функции</h2>
                    <pre><code>// Просто вызываем по имени
let message = greet("Алексей");
console.log(message); // "Привет, Алексей!"

// Можно использовать сразу
console.log(greet("Мария")); // "Привет, Мария!"</code></pre>

                    <h2>🔒 Область видимости (Scope)</h2>
                    <p>Область видимости определяет, где переменная доступна. В JavaScript есть три типа областей видимости:</p>
                    <ul>
                        <li><strong>Глобальная область</strong> — переменные доступны везде</li>
                        <li><strong>Функциональная область</strong> — переменные внутри функции</li>
                        <li><strong>Блочная область</strong> — переменные внутри <code>{ }</code> (для let и const)</li>
                    </ul>

                    <pre><code>// Глобальная переменная
let globalVar = "Я доступен везде";

function myFunction() {
    // Локальная переменная
    let localVar = "Я только внутри функции";
    console.log(globalVar); // ✅ доступно
    console.log(localVar);  // ✅ доступно
}

myFunction();
console.log(globalVar);     // ✅ доступно
// console.log(localVar);   // ❌ Ошибка! localVar не виден снаружи

// Блочная область видимости
if (true) {
    let blockVar = "Я только внутри блока";
    var oldVar = "var не знает блоков";
    console.log(blockVar);   // ✅ доступно
}
// console.log(blockVar);    // ❌ Ошибка!
console.log(oldVar);         // ✅ работает (var "пробивает" блок)</code></pre>

                    <h2>🔄 Замыкания (Closures)</h2>
                    <p>Замыкание — это функция, которая "запоминает" переменные из внешней области видимости:</p>
                    <pre><code>function createCounter() {
    let count = 0;

    return function() {
        count++;
        return count;
    };
}

const counter = createCounter();
console.log(counter()); // 1
console.log(counter()); // 2
console.log(counter()); // 3</code></pre>

                    <div class="quiz-block">
                        <div class="quiz-question">📝 Вопрос: Какой синтаксис объявления функции является современным и предпочтительным?</div>
                        <div class="quiz-option"><input type="radio" name="quiz3" value="function" id="q3_1"><label for="q3_1">function name() {}</label></div>
                        <div class="quiz-option"><input type="radio" name="quiz3" value="arrow" id="q3_2"><label for="q3_2">() => {}</label></div>
                        <div class="quiz-option"><input type="radio" name="quiz3" value="var" id="q3_3"><label for="q3_3">var func = ()</label></div>
                        <button class="quiz-submit" onclick="checkQuiz(3, 'arrow')">Проверить</button>
                        <div class="quiz-result" id="quizResult3"></div>
                    </div>
                `
            }
        ]
    };

    let userProgress = {
        courseId: 1,
        completedLessons: [1],
        currentLessonId: 1
    };

    function renderLessonContent(lesson) {
        const wrapper = document.getElementById('lessonContentWrapper');

        const html = `
            <div class="lesson-title-main">${escapeHtml(lesson.title)}</div>
            <div class="lesson-meta">
                <span><i class="far fa-clock"></i> ${lesson.duration}</span>
                <span><i class="fas fa-book-open"></i> Урок ${lesson.id} из ${courseData.lessons.length}</span>
            </div>
            <div class="lesson-body">
                ${lesson.content}
            </div>
        `;

        wrapper.innerHTML = html;
    }

    function loadLesson(lessonId) {
        const lesson = courseData.lessons.find(l => l.id === lessonId);
        if (!lesson) return;

        userProgress.currentLessonId = lessonId;
        renderLessonContent(lesson);
        renderSidebar();
        updateNavigationButtons();
        updateCompleteButton();

        if (window.innerWidth <= 768) {
            document.getElementById('sidebarLessons').classList.remove('open');
        }

        document.querySelector('.main-content').scrollTop = 0;
    }

    function renderSidebar() {
        const container = document.getElementById('lessonsListSidebar');
        const completedCount = userProgress.completedLessons.length;
        const totalCount = courseData.lessons.length;
        const percent = Math.round((completedCount / totalCount) * 100);

        document.getElementById('courseProgressPercent').innerText = percent + '%';
        document.getElementById('courseProgressFill').style.width = percent + '%';
        document.getElementById('courseTitleSidebar').innerText = courseData.title;

        container.innerHTML = courseData.lessons.map(lesson => {
            const isCompleted = userProgress.completedLessons.includes(lesson.id);
            const isActive = userProgress.currentLessonId === lesson.id;
            return `
                <div class="lesson-item-sidebar ${isCompleted ? 'completed' : ''} ${isActive ? 'active' : ''}" onclick="loadLesson(${lesson.id})">
                    <div class="lesson-number">${isCompleted ? '<i class="fas fa-check"></i>' : lesson.id}</div>
                    <div class="lesson-info-sidebar">
                        <div class="lesson-title-sidebar">${escapeHtml(lesson.title)}</div>
                        <div class="lesson-duration"><i class="far fa-clock"></i> ${lesson.duration}</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function markCurrentLessonComplete() {
        const currentId = userProgress.currentLessonId;
        if (!userProgress.completedLessons.includes(currentId)) {
            userProgress.completedLessons.push(currentId);
            showToast('✅ Урок завершен! Отличная работа!', 'success');
            renderSidebar();
            updateCompleteButton();

            const allCompleted = userProgress.completedLessons.length === courseData.lessons.length;
            if (allCompleted) {
                setTimeout(() => {
                    showToast('🎉 Поздравляем! Вы завершили весь курс! Получите сертификат в профиле.', 'success');
                }, 500);
            }
        } else {
            showToast('Этот урок уже завершен', 'info');
        }
    }

    function updateCompleteButton() {
        const btn = document.getElementById('completeLessonBtn');
        const isCompleted = userProgress.completedLessons.includes(userProgress.currentLessonId);
        if (isCompleted) {
            btn.innerHTML = '<i class="fas fa-check-circle"></i> Пройдено';
            btn.classList.add('completed');
        } else {
            btn.innerHTML = '<i class="fas fa-check"></i> Завершить урок';
            btn.classList.remove('completed');
        }
    }

    function nextLesson() {
        const currentIndex = courseData.lessons.findIndex(l => l.id === userProgress.currentLessonId);
        if (currentIndex < courseData.lessons.length - 1) {
            loadLesson(courseData.lessons[currentIndex + 1].id);
        } else {
            showToast('🎉 Вы завершили все уроки курса!', 'success');
        }
    }

    function prevLesson() {
        const currentIndex = courseData.lessons.findIndex(l => l.id === userProgress.currentLessonId);
        if (currentIndex > 0) {
            loadLesson(courseData.lessons[currentIndex - 1].id);
        }
    }

    function updateNavigationButtons() {
        const currentIndex = courseData.lessons.findIndex(l => l.id === userProgress.currentLessonId);
        document.getElementById('prevLessonBtn').disabled = currentIndex === 0;
        document.getElementById('nextLessonBtn').disabled = currentIndex === courseData.lessons.length - 1;
    }

    function checkQuiz(quizNumber, correctAnswer) {
        const selected = document.querySelector(`input[name="quiz${quizNumber}"]:checked`);
        const resultDiv = document.getElementById(`quizResult${quizNumber}`);

        if (!selected) {
            resultDiv.innerHTML = '⚠️ Пожалуйста, выберите ответ';
            resultDiv.className = 'quiz-result incorrect';
            return;
        }

        if (selected.value === correctAnswer) {
            resultDiv.innerHTML = '✅ Правильно! Отличная работа!';
            resultDiv.className = 'quiz-result correct';
        } else {
            resultDiv.innerHTML = '❌ Неправильно. Попробуйте еще раз!';
            resultDiv.className = 'quiz-result incorrect';
        }

        setTimeout(() => {
            if (resultDiv.className.includes('correct')) {
                resultDiv.style.opacity = '0';
                setTimeout(() => {
                    resultDiv.className = 'quiz-result';
                    resultDiv.innerHTML = '';
                    resultDiv.style.opacity = '1';
                }, 2000);
            }
        }, 3000);
    }

    function toggleSidebar() {
        document.getElementById('sidebarLessons').classList.toggle('open');
    }

    function showToast(message, type) {
        const oldToast = document.querySelector('.custom-toast');
        if (oldToast) oldToast.remove();

        const toast = document.createElement('div');
        toast.className = 'custom-toast';
        const icon = type === 'success' ? 'fa-check-circle' : 'fa-info-circle';
        toast.innerHTML = `<i class="fas ${icon}"></i> ${message}`;
        document.body.appendChild(toast);

        toast.style.position = 'fixed';
        toast.style.bottom = '30px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.background = type === 'success' ? '#0F2A1F' : '#1A2A3A';
        toast.style.border = `1px solid ${type === 'success' ? '#10B981' : '#3B82F6'}`;
        toast.style.padding = '12px 24px';
        toast.style.borderRadius = '40px';
        toast.style.zIndex = '9999';
        toast.style.fontFamily = "'Inter', sans-serif";
        toast.style.fontSize = '14px';

        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 300);
        }, 2500);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    document.addEventListener('click', function(e) {
        if (window.innerWidth <= 768) {
            const sidebar = document.getElementById('sidebarLessons');
            const menuBtn = document.getElementById('menuToggle');
            if (sidebar && menuBtn && !sidebar.contains(e.target) && !menuBtn.contains(e.target) && sidebar.classList.contains('open')) {
                sidebar.classList.remove('open');
            }
        }
    });

    loadLesson(userProgress.currentLessonId);
    </script>
</body>
</html>
