<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SkillTrade - Регистрация аккаунта</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, #0B0F1C, #03050B);
            color: #EDF2FF;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* кастомный скролл */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #141A2E;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #2D3A5E;
            border-radius: 10px;
        }

        /* контейнер */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 32px;
            width: 100%;
        }

        /* хедер */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 0 20px;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
            width: 100%;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #C084FC, #3B82F6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }

            .logo i {
                background: none;
                -webkit-background-clip: unset;
                color: #3B82F6;
                font-size: 32px;
            }

        .nav-links {
            display: flex;
            gap: 28px;
            align-items: center;
        }

        .btn-outline-light {
            background: transparent;
            border: 1px solid #3B82F6;
            color: #3B82F6;
            padding: 8px 28px;
            border-radius: 40px;
            font-weight: 600;
            transition: 0.2s;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

            .btn-outline-light:hover {
                background: rgba(59,130,246,0.1);
                border-color: #60A5FA;
                color: #60A5FA;
            }

        /* основная секция с формой */
        .register-section {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            padding: 40px 20px;
        }

        .register-card {
            background: rgba(14, 22, 41, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            padding: 48px 40px;
            max-width: 550px;
            width: 100%;
            transition: 0.3s;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5);
        }

        .register-header {
            text-align: center;
            margin-bottom: 36px;
        }

            .register-header h1 {
                font-size: 36px;
                font-weight: 700;
                background: linear-gradient(135deg, #FFFFFF, #A2C3FF);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
                margin-bottom: 12px;
            }

            .register-header p {
                color: #94A3D8;
                font-size: 15px;
            }

        .input-group {
            margin-bottom: 22px;
        }

        .input-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #CBD5F0;
            font-size: 14px;
        }

            .input-label span {
                color: #EF4444;
            }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

            .input-wrapper i {
                position: absolute;
                left: 18px;
                color: #5B6EAE;
                font-size: 18px;
            }

            .input-wrapper input, .input-wrapper select {
                width: 100%;
                background: #0A0F1E;
                border: 1px solid #263153;
                border-radius: 28px;
                padding: 16px 20px 16px 50px;
                font-size: 16px;
                color: white;
                font-family: 'Inter', sans-serif;
                transition: 0.2s;
                outline: none;
            }

            .input-wrapper select {
                appearance: none;
                cursor: pointer;
            }

                .input-wrapper select option {
                    background: #0A0F1E;
                    color: white;
                }

                .input-wrapper input:focus, .input-wrapper select:focus {
                    border-color: #3B82F6;
                    box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
                }

            .input-wrapper input::placeholder {
                color: #4A5A82;
            }

        .toggle-password {
            position: absolute;
            right: 18px;
            left: auto;
            cursor: pointer;
            color: #5B6EAE;
            transition: 0.2s;
        }

            .toggle-password:hover {
                color: #3B82F6;
            }

        .password-hint {
            font-size: 12px;
            color: #6C7AA6;
            margin-top: 6px;
            margin-left: 12px;
        }

        .terms-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0 28px;
        }

            .terms-row input {
                width: 18px;
                height: 18px;
                cursor: pointer;
                accent-color: #3B82F6;
            }

            .terms-row label {
                font-size: 14px;
                color: #B9C7E6;
                cursor: pointer;
            }

            .terms-row a {
                color: #3B82F6;
                text-decoration: none;
            }

                .terms-row a:hover {
                    text-decoration: underline;
                }

        .btn-register {
            width: 100%;
            background: linear-gradient(95deg, #3B82F6, #8B5CF6);
            border: none;
            padding: 16px;
            border-radius: 44px;
            font-weight: 700;
            font-size: 18px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 14px rgba(59,130,246,0.3);
            margin-bottom: 28px;
        }

            .btn-register:hover {
                transform: translateY(-2px);
                box-shadow: 0 10px 20px rgba(59,130,246,0.4);
            }

        .login-prompt {
            text-align: center;
            color: #94A3D8;
            font-size: 15px;
            border-top: 1px solid #1F2B46;
            padding-top: 28px;
        }

            .login-prompt a {
                color: #3B82F6;
                text-decoration: none;
                font-weight: 600;
                margin-left: 6px;
            }

                .login-prompt a:hover {
                    text-decoration: underline;
                }

        footer {
            text-align: center;
            padding: 28px 0;
            border-top: 1px solid #1A2340;
            color: #6C7AA6;
            margin-top: auto;
            font-size: 14px;
        }

        @media (max-width: 650px) {
            .container {
                padding: 0 20px;
            }

            .register-card {
                padding: 32px 24px;
            }

            .navbar {
                flex-direction: column;
                gap: 20px;
                align-items: center;
            }

            .logo {
                align-self: flex-start;
            }

            .nav-links {
                align-self: flex-end;
                margin-top: -50px;
            }
        }

        @media (min-width: 651px) {
            .navbar {
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- навигация -->
        <div class="navbar">
            <a href="#" class="logo">
                <i class="fas fa-chalkboard-user"></i>
                <span>SkillTrade</span>
            </a>
            <div class="nav-links">
                <a href="#" class="btn-outline-light">Войти</a>
            </div>
        </div>
    </div>

    <!-- форма регистрации -->
    <div class="register-section">
        <div class="register-card">
            <div class="register-header">
                <h1>Создать аккаунт</h1>
                <p>Начните своё обучение уже сегодня</p>
            </div>

            <form id="registerForm">
                <div class="input-group">
                    <label class="input-label">Логин <span>*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="regLogin" placeholder="например: ivan123" autocomplete="username">
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label">Имя <span>*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-user-circle"></i>
                        <input type="text" id="regName" placeholder="Иван Иванов" autocomplete="name">
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label">Роль <span>*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-user-tag"></i>
                        <select id="regRole">
                            <option value="student">Студент - хочу учиться</option>
                            <option value="actor">Автор - хочу создавать курсы</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label">Пароль <span>*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="regPassword" placeholder="Минимум 6 символов" autocomplete="new-password">
                        <i class="fas fa-eye toggle-password" id="togglePasswordIcon"></i>
                    </div>
                    <div class="password-hint">
                        <i class="fas fa-info-circle"></i> Пароль должен содержать заглавную букву и цифру
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label">Подтверждение пароля <span>*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="regConfirmPassword" placeholder="Повторите пароль" autocomplete="off">
                        <i class="fas fa-eye toggle-password" id="toggleConfirmIcon"></i>
                    </div>
                </div>

                <div class="terms-row">
                    <input type="checkbox" id="agreeTerms">
                    <label for="agreeTerms">
                        Я согласен с <a href="#">пользовательским соглашением</a> и <a href="#">политикой конфиденциальности</a>
                    </label>
                </div>

                <button type="submit" class="btn-register">
                    <i class="fas fa-user-plus"></i> Зарегистрироваться
                </button>

                <div class="login-prompt">
                    Уже есть аккаунт?<a href="#">Войти</a>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <p>© 2025 SkillTrade — Образовательная платформа нового поколения</p>
    </footer>

    <script>
    // Элементы DOM
    const togglePassword = document.getElementById('togglePasswordIcon');
    const toggleConfirm = document.getElementById('toggleConfirmIcon');
    const passwordInput = document.getElementById('regPassword');
    const confirmInput = document.getElementById('regConfirmPassword');
    const registerForm = document.getElementById('registerForm');
    const regLogin = document.getElementById('regLogin');
    const regName = document.getElementById('regName');
    const regRole = document.getElementById('regRole');
    const agreeTerms = document.getElementById('agreeTerms');

    // Показать / скрыть пароль
    togglePassword.addEventListener('click', function() {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        this.classList.toggle('fa-eye');
        this.classList.toggle('fa-eye-slash');
    });

    toggleConfirm.addEventListener('click', function() {
        const type = confirmInput.getAttribute('type') === 'password' ? 'text' : 'password';
        confirmInput.setAttribute('type', type);
        this.classList.toggle('fa-eye');
        this.classList.toggle('fa-eye-slash');
    });

    // Валидация пароля (заглавная буква + цифра, минимум 6 символов)
    function isValidPassword(password) {
        if (password.length < 6) return false;
        let hasUpperCase = /[A-Z]/.test(password);
        let hasDigit = /\d/.test(password);
        return hasUpperCase && hasDigit;
    }

    // Показать тост-уведомление
    function showToast(message, type) {
        const oldToast = document.querySelector('.custom-toast');
        if(oldToast) oldToast.remove();

        const toast = document.createElement('div');
        toast.className = `custom-toast toast-${type}`;
        toast.innerHTML = `
            <div style="display: flex; align-items: center; gap: 12px;">
                <i class="fas ${type === 'success' ? 'fa-circle-check' : 'fa-circle-exclamation'}" style="font-size:22px;"></i>
                <span>${message}</span>
            </div>
        `;
        document.body.appendChild(toast);

        toast.style.position = 'fixed';
        toast.style.bottom = '30px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.background = type === 'success' ? '#0F2A1F' : '#2A1A2A';
        toast.style.border = type === 'success' ? '1px solid #10B981' : '1px solid #EF4444';
        toast.style.color = '#fff';
        toast.style.padding = '14px 28px';
        toast.style.borderRadius = '60px';
        toast.style.fontWeight = '500';
        toast.style.zIndex = '9999';
        toast.style.backdropFilter = 'blur(12px)';
        toast.style.backgroundColor = type === 'success' ? 'rgba(16,185,129,0.12)' : 'rgba(239,68,68,0.12)';
        toast.style.fontFamily = "'Inter', sans-serif";
        toast.style.fontSize = '14px';
        toast.style.boxShadow = '0 8px 20px rgba(0,0,0,0.3)';
        toast.style.whiteSpace = 'nowrap';

        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 400);
        }, 3000);
    }

    // Обработка отправки формы
    registerForm.addEventListener('submit', function(e) {
        e.preventDefault();

        const login = regLogin.value.trim();
        const name = regName.value.trim();
        const role = regRole.value;
        const password = passwordInput.value;
        const confirmPassword = confirmInput.value;
        const termsAccepted = agreeTerms.checked;

        // Валидация
        if (!login || !name || !password || !confirmPassword) {
            showToast('❌ Заполните все обязательные поля', 'error');
            return;
        }

        if (login.length < 3) {
            showToast('❌ Логин должен содержать минимум 3 символа', 'error');
            return;
        }

        if (name.length < 2) {
            showToast('❌ Имя должно содержать минимум 2 символа', 'error');
            return;
        }

        if (!isValidPassword(password)) {
            showToast('❌ Пароль должен содержать минимум 6 символов, заглавную букву и цифру', 'error');
            return;
        }

        if (password !== confirmPassword) {
            showToast('❌ Пароли не совпадают', 'error');
            return;
        }

        if (!termsAccepted) {
            showToast('❌ Необходимо согласиться с условиями', 'error');
            return;
        }

        // Статическая демо-регистрация
        // Проверка существующего логина (демо)
        if (login === 'demo' || login === 'admin' || login === 'student') {
            showToast('❌ Этот логин уже занят', 'error');
            return;
        }

        // Успешная регистрация
        showToast('✅ Регистрация успешна! Перенаправление на страницу входа...', 'success');

        // Сохраняем данные в localStorage для демо
        localStorage.setItem('skilltrade_demo_user', JSON.stringify({
            login: login,
            name: name,
            role: role,
            registeredAt: new Date().toISOString()
        }));

        setTimeout(() => {
            window.location.href = 'login.html';
        }, 2000);
    });

    // Ссылка на вход
    document.querySelector('.login-prompt a').addEventListener('click', (e) => {
        e.preventDefault();
        window.location.href = 'login.html';
    });

    // Ссылка на главную по логотипу
    document.querySelector('.logo').addEventListener('click', (e) => {
        e.preventDefault();
        window.location.href = 'index.html';
    });

    // Кнопка "Войти" в навигации
    document.querySelector('.btn-outline-light').addEventListener('click', (e) => {
        e.preventDefault();
        window.location.href = 'login.html';
    });

    // Стили для тоста
    const style = document.createElement('style');
    style.textContent = `
        .custom-toast.toast-info {
            background: rgba(59,130,246,0.15);
            border-color: #3B82F6;
        }
        .custom-toast {
            transition: opacity 0.25s ease;
        }
        @media (max-width: 550px) {
            .custom-toast { white-space: normal; width: 90%; text-align: center; }
        }
    `;
    document.head.appendChild(style);
    </script>
</body>
</html>
