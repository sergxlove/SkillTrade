version: '3.8'

services:
  webbuilder-db:
    image: postgres:15-alpine
    container_name: skilltrade-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "Dvta7WAVgwXk1aGi"
      POSTGRES_DB: db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/dataskilltrade
    restart: unless-stopped
volumes:
  postgres-data: